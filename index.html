<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AK IG 限動生成器 v4｜文字轉圖卡</title>
<style>
:root{--bg:#0b1220;--card:#111827;--line:#334155;--text:#f8fafc;--muted:#cbd5e1;--accent:#60a5fa;--accent2:#a78bfa}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:linear-gradient(180deg,#0b1220,#111827 40%,#0b1220);color:var(--text)}
.wrap{max-width:1320px;margin:0 auto;padding:20px}
h1{margin:0 0 8px;font-size:30px}
.sub{color:var(--muted);line-height:1.7;margin-bottom:18px}
.grid{display:grid;grid-template-columns:390px 1fr;gap:16px}
.card{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 16px 36px rgba(0,0,0,.25)}
label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px}
input,select,textarea{width:100%;padding:11px 12px;border-radius:11px;border:1px solid #475569;background:#0b1220;color:#fff;margin-bottom:12px;font-size:14px}
textarea{resize:vertical;min-height:88px}
.section-title{font-size:14px;font-weight:800;margin:12px 0 8px;color:#dbeafe}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.actions,.story-actions,.canvas-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
button{padding:11px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:800}
.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff}
.secondary{background:#374151;color:#fff}
.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
.small,.tiny{font-size:12px;color:var(--muted);line-height:1.6}
.story,.canvas-card{background:#0b1220;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
.badge{display:inline-block;font-size:12px;padding:6px 9px;border-radius:999px;background:#1d4ed8;color:#fff;margin-bottom:8px}
.story-text{white-space:pre-wrap;line-height:1.8;font-size:16px}
.preview-note{padding:10px 12px;border-radius:12px;background:#0b1220;border:1px dashed var(--line);color:var(--muted);line-height:1.6;margin-bottom:12px}
.pillbox{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:7px 10px;border-radius:999px;border:1px solid var(--line);cursor:pointer;background:#0b1220;color:var(--muted);font-size:12px}
.pill.active{background:#1e3a8a;color:#fff;border-color:#3b82f6}
.canvas-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:14px}
.canvas-box{width:100%;aspect-ratio:9/16;background:#0f172a;border-radius:20px;overflow:hidden;border:1px solid #475569;display:block}
@media (max-width:980px){.grid,.row2,.row3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h1>AK IG 限動生成器 v4｜文字 → 圖卡</h1>
  <div class="sub">這版除了可調文案，還能把 5 則限動直接轉成 IG 直式圖卡。建議流程：左邊設定 → 生成 5 則 → 在右邊下載單張 PNG，再發到 IG。</div>
  <div class="grid">
    <div class="card">
      <div class="section-title">A. 核心設定</div>
      <label>你的定位 / 人設</label>
      <input id="persona" value="正在經營美安，也想透過自媒體分享自己的改變與生活方式的人">
      <label>你以前是什麼狀態（過去版自己）</label>
      <input id="pastSelf" value="以前常常很累、沒方向，也不知道怎麼經營內容">
      <label>你現在的轉變</label>
      <input id="transformation" value="現在開始有系統地分享、經營自媒體，也更知道怎麼和人建立信任">
      <label>主要客群</label>
      <input id="audience" value="想開始經營自媒體、但不知道每天要發什麼的人">
      <label>今日主題</label>
      <input id="topic" value="自媒體起步、內容靈感、限動經營">

      <div class="row2">
        <div>
          <label>語氣</label>
          <select id="tone">
            <option>自然真誠</option>
            <option>溫柔陪伴</option>
            <option>專業可信</option>
            <option>輕鬆朋友感</option>
            <option>激勵行動</option>
          </select>
        </div>
        <div>
          <label>CTA 強度</label>
          <select id="ctaStrength">
            <option>輕</option>
            <option>中</option>
            <option>強</option>
          </select>
        </div>
      </div>

      <label>你的口頭語 / 慣用語（逗號分隔）</label>
      <input id="catchphrases" value="其實,老實說,慢慢來,真的,我自己也是">
      <label>避免用詞（逗號分隔）</label>
      <input id="avoid" value="暴富,躺賺,保證,神奇,秒瘦">

      <div class="section-title">B. 內容方向微調</div>
      <label>想傳達的核心價值</label>
      <input id="coreValue" value="真實、可持續、先建立信任再談成交">
      <label>希望大家對你的感覺</label>
      <input id="impression" value="真誠、有方法、不會硬推">
      <label>想引導的最終行動</label>
      <input id="goalAction" value="私訊我、和我聊聊、問我怎麼開始">
      <label>補充限制 / 不想提到的方向</label>
      <textarea id="extraGuard">不要太像直銷話術，不要一直提產品名稱，不要過度誇張。</textarea>

      <div class="section-title">C. 輸出風格</div>
      <label>情緒關鍵字（可多選）</label>
      <div class="pillbox" id="emotionBox"></div>
      <div class="row2">
        <div>
          <label>每則字數感</label>
          <select id="lengthMode">
            <option>短</option>
            <option selected>中</option>
            <option>長</option>
          </select>
        </div>
        <div>
          <label>輸出模式</label>
          <select id="mode">
            <option>平衡</option>
            <option>偏生活</option>
            <option>偏成交</option>
            <option>偏招募</option>
            <option>偏知識</option>
          </select>
        </div>
      </div>

      <div class="section-title">D. 圖卡樣式</div>
      <div class="row3">
        <div>
          <label>背景風格</label>
          <select id="bgStyle">
            <option>深色漸層</option>
            <option>淡色簡約</option>
            <option>紫藍品牌感</option>
            <option>奶茶質感</option>
            <option>森林安定感</option>
          </select>
        </div>
        <div>
          <label>文字對齊</label>
          <select id="align">
            <option>左對齊</option>
            <option>置中</option>
          </select>
        </div>
        <div>
          <label>顯示頁角標籤</label>
          <select id="showTag">
            <option>顯示</option>
            <option>隱藏</option>
          </select>
        </div>
      </div>
      <label>頁尾名稱 / 品牌字樣</label>
      <input id="brandName" value="Lin Sheng Tang">

      <div class="actions">
        <button class="primary" id="generateBtn">一鍵生成 5 則 + 圖卡</button>
        <button class="secondary" id="copyAllBtn">複製全部文案</button>
        <button class="ghost" id="downloadAllBtn">下載全部圖卡</button>
      </div>
      <div class="small">這版仍是純前端本地工具，不會上傳你的內容。若在 ChatGPT 內預覽互動受限，請下載後用 Safari / Chrome 開啟。</div>
    </div>

    <div class="card">
      <div class="preview-note">右邊會同時顯示文案與圖卡預覽。圖卡尺寸為直式 1080×1920，適合 IG 限動。</div>
      <div id="storiesOutput"></div>
      <div class="canvas-wrap" id="canvasWrap"></div>
    </div>
  </div>
</div>

<script>
(function () {
  const emotions = ["真實","共鳴","信任","轉變","陪伴","行動","方法","希望"];
  const selectedEmotions = new Set(["真實","共鳴","信任"]);
  const openers = ["今天突然很有感","這幾天一直在想一件事","我最近越來越確定","老實說，這件事我以前真的沒想過","今天忙完後，我腦中一直在轉這件事"];
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function splitList(text){ return text.split(/[、,，\n]/).map(s => s.trim()).filter(Boolean); }

  function getConfig(){
    return {
      persona: document.getElementById("persona").value.trim(),
      pastSelf: document.getElementById("pastSelf").value.trim(),
      transformation: document.getElementById("transformation").value.trim(),
      audience: document.getElementById("audience").value.trim(),
      topic: document.getElementById("topic").value.trim(),
      tone: document.getElementById("tone").value,
      ctaStrength: document.getElementById("ctaStrength").value,
      catchphrases: splitList(document.getElementById("catchphrases").value),
      avoid: splitList(document.getElementById("avoid").value),
      coreValue: document.getElementById("coreValue").value.trim(),
      impression: document.getElementById("impression").value.trim(),
      goalAction: document.getElementById("goalAction").value.trim(),
      extraGuard: document.getElementById("extraGuard").value.trim(),
      lengthMode: document.getElementById("lengthMode").value,
      mode: document.getElementById("mode").value,
      bgStyle: document.getElementById("bgStyle").value,
      align: document.getElementById("align").value,
      showTag: document.getElementById("showTag").value,
      brandName: document.getElementById("brandName").value.trim() || "Your Brand"
    };
  }
  function phrase(cfg){ return cfg.catchphrases.length ? pick(cfg.catchphrases) : ""; }
  function emotionText(){ return [...selectedEmotions].join("、"); }
  function firstTopic(cfg){ return splitList(cfg.topic)[0] || cfg.topic || "內容經營"; }
  function toneLine(tone){
    const map = {
      "自然真誠":"我想用比較真實、沒有距離的方式講這件事。",
      "溫柔陪伴":"不是要你立刻做到，而是想陪你慢慢找到適合自己的節奏。",
      "專業可信":"這件事我後來是用比較有方法的方式去整理，差很多。",
      "輕鬆朋友感":"不用一次做到很滿，先從好執行的一步開始就好。",
      "激勵行動":"很多時候不是你做不到，而是你還沒真的開始。"
    };
    return map[tone] || "";
  }
  function modeHint(mode){
    const map = {
      "平衡":"兼顧真實、方法與引導。",
      "偏生活":"多放生活感與情緒連結。",
      "偏成交":"多一點問題到解法的推進感。",
      "偏招募":"多一點關於成長與開始的可能性。",
      "偏知識":"多一點可學習、可理解的說明。"
    };
    return map[mode] || "";
  }
  function lenCompress(text, mode){
    if(mode === "短") return text.replace(/\n\n/g,"\n").split("\n").slice(0,3).join("\n");
    if(mode === "長") return text + "\n\n我自己現在最在意的，其實不是把話講得多漂亮，而是這些分享有沒有真的幫到對的人。";
    return text;
  }
  function sanitize(text, avoidList){
    let out = text;
    avoidList.forEach(w => {
      if(!w) return;
      const reg = new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
      out = out.replace(reg,"＊");
    });
    return out;
  }
  function buildLife(cfg){
    let text = `${pick(openers)}\n${phrase(cfg)}，以我現在「${cfg.persona}」的狀態來說，最近對「${cfg.topic}」特別有感。\n\n因為我很清楚自己以前是怎麼走過來的：${cfg.pastSelf}。\n現在回頭看，很多改變不是突然變厲害，而是開始願意慢慢調整。`;
    if(cfg.mode === "偏生活") text += `\n\n我也想把這種生活裡真實發生的感覺，留下來分享。`;
    return lenCompress(sanitize(text, cfg.avoid), cfg.lengthMode);
  }
  function buildPain(cfg){
    let text = `給「${cfg.audience}」的一句話：\n\n很多時候你卡住，不一定是因為不夠努力，而是因為你一直在一個沒有方法、也沒有人陪你整理的狀態裡。\n${phrase(cfg)}，我以前就是這樣：${cfg.pastSelf}。\n\n所以如果你最近也在被「${cfg.topic}」困住，我真的很能理解。`;
    if(cfg.mode === "偏成交") text += `\n\n先把問題講清楚，比急著找答案更重要。`;
    return lenCompress(sanitize(text, cfg.avoid), cfg.lengthMode);
  }
  function buildKnowledge(cfg){
    let text = `今天關於「${cfg.topic}」，我最想分享的一個觀念是：\n\n真正有用的，不是一次塞很多東西給自己，而是先知道你現在最需要調整的是哪一塊。\n以我自己的經驗，從「${cfg.pastSelf}」走到「${cfg.transformation}」，差別通常不在天分，而是在有沒有一套比較能持續的方式。\n\n${toneLine(cfg.tone)}\n${modeHint(cfg.mode)}`;
    if(cfg.mode === "偏知識") text += `\n\n簡單說，就是先釐清、再執行、再微調。`;
    return lenCompress(sanitize(text, cfg.avoid), cfg.lengthMode);
  }
  function buildStory(cfg){
    let text = `我現在之所以會一直分享這些，不是因為我本來就很會，而是因為我曾經就是那個「${cfg.pastSelf}」的人。\n\n後來我慢慢變成現在這樣：${cfg.transformation}。\n所以我很在意一件事：如果我今天願意多講一點，也許就能幫到一個正在經歷同樣事情的人。\n\n我希望別人認識我的感覺是：${cfg.impression}。`;
    if(cfg.mode === "偏招募") text += `\n\n有些人看到的是工具，但我看到的是一種可以慢慢建立自己的可能性。`;
    return lenCompress(sanitize(text, cfg.avoid), cfg.lengthMode);
  }
  function buildCTA(cfg){
    const light = [
      `如果你最近也在想「${cfg.topic}」這件事，可以跟我說，我可以把我現在怎麼整理的方法分享給你。`,
      `有在經歷「${cfg.topic}」的人，可以私訊我，我們用比較輕鬆的方式聊聊。`
    ];
    const mid = [
      `如果你也想開始整理「${cfg.topic}」，直接私訊我「想開始」，我把我自己的做法跟你說。`,
      `你若也卡在「${cfg.topic}」，可以來找我，我把我一路上怎麼調整的脈絡整理給你。`
    ];
    const strong = [
      `如果你不想再一直停在原地，直接私訊我，我跟你說我是怎麼從「${cfg.pastSelf}」走到現在的。`,
      `你如果真的想開始改變，現在就來找我，我帶你先把第一步想清楚。`
    ];
    let bank = light;
    if(cfg.ctaStrength === "中") bank = mid;
    if(cfg.ctaStrength === "強") bank = strong;
    let text = `${pick(bank)}\n\n我在意的不是把人推去做什麼，而是先讓對的人知道：原來這件事可以不用自己亂摸。\n#${firstTopic(cfg)} #${emotionText()}`;
    return lenCompress(sanitize(text, cfg.avoid), cfg.lengthMode);
  }
  function buildStories(cfg){
    return [
      {title:"生活 / 破防禦", short:"生活", text:buildLife(cfg)},
      {title:"痛點 / 引共鳴", short:"痛點", text:buildPain(cfg)},
      {title:"知識 / 建專業", short:"知識", text:buildKnowledge(cfg)},
      {title:"故事 / 建信任", short:"故事", text:buildStory(cfg)},
      {title:"CTA / 引私訊", short:"CTA", text:buildCTA(cfg)}
    ];
  }
  function renderEmotions(){
    const box = document.getElementById("emotionBox");
    box.innerHTML = "";
    emotions.forEach(e => {
      const el = document.createElement("div");
      el.className = "pill" + (selectedEmotions.has(e) ? " active" : "");
      el.textContent = e;
      el.addEventListener("click", function(){
        if(selectedEmotions.has(e)) selectedEmotions.delete(e); else selectedEmotions.add(e);
        renderEmotions();
      });
      box.appendChild(el);
    });
  }
  function copyText(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>alert("已複製")).catch(()=>fallbackCopy(text));
    } else fallbackCopy(text);
  }
  function fallbackCopy(text){
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); alert("已複製"); } catch(e){ alert("請手動複製"); }
    document.body.removeChild(ta);
  }
  function renderStoriesAndCards(){
    const cfg = getConfig();
    const stories = buildStories(cfg);
    const storiesOut = document.getElementById("storiesOutput");
    storiesOut.innerHTML = "";
    stories.forEach((story, idx) => {
      const box = document.createElement("div");
      box.className = "story";
      box.innerHTML = `<div class="badge">${story.title}</div><div class="story-text"></div><div class="story-actions"><button class="secondary">複製這則</button></div><div class="tiny">第 ${idx+1} 則</div>`;
      box.querySelector(".story-text").textContent = story.text;
      box.querySelector("button").addEventListener("click", ()=>copyText(story.text));
      storiesOut.appendChild(box);
    });

    const wrap = document.getElementById("canvasWrap");
    wrap.innerHTML = "";
    stories.forEach((story, idx) => {
      const outer = document.createElement("div");
      outer.className = "canvas-card";
      const canvas = document.createElement("canvas");
      canvas.width = 1080; canvas.height = 1920; canvas.className = "canvas-box";
      drawStoryCard(canvas, story, cfg, idx+1);
      const title = document.createElement("div");
      title.className = "tiny"; title.style.marginTop = "8px";
      title.textContent = `圖卡 ${idx+1}｜${story.title}`;
      const actions = document.createElement("div");
      actions.className = "canvas-actions";
      const btn = document.createElement("button");
      btn.className = "secondary"; btn.textContent = "下載 PNG";
      btn.addEventListener("click", ()=>downloadCanvas(canvas, `ig-story-${idx+1}.png`));
      actions.appendChild(btn);
      outer.appendChild(canvas); outer.appendChild(title); outer.appendChild(actions);
      wrap.appendChild(outer);
    });
  }
  function palette(style){
    const map = {
      "深色漸層": {bg1:"#0f172a", bg2:"#1e293b", accent:"#93c5fd", text:"#f8fafc", sub:"#cbd5e1"},
      "淡色簡約": {bg1:"#f8fafc", bg2:"#e2e8f0", accent:"#2563eb", text:"#0f172a", sub:"#334155"},
      "紫藍品牌感": {bg1:"#312e81", bg2:"#1d4ed8", accent:"#ddd6fe", text:"#ffffff", sub:"#e0e7ff"},
      "奶茶質感": {bg1:"#faf7f2", bg2:"#e7d9c8", accent:"#8b5e3c", text:"#3b2f2f", sub:"#5b4a42"},
      "森林安定感": {bg1:"#052e16", bg2:"#166534", accent:"#bbf7d0", text:"#f0fdf4", sub:"#dcfce7"}
    };
    return map[style] || map["深色漸層"];
  }
  function drawRoundedRect(ctx,x,y,w,h,r){
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }
  function wrapText(ctx,text,maxWidth){
    const paragraphs = text.split("\n"), lines = [];
    paragraphs.forEach(p => {
      if(p.trim()===""){ lines.push(""); return; }
      let line = "";
      for(let i=0;i<p.length;i++){
        const test = line + p[i];
        if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = p[i]; }
        else line = test;
      }
      if(line) lines.push(line);
    });
    return lines;
  }
  function drawStoryCard(canvas,story,cfg,pageNum){
    const ctx = canvas.getContext("2d"), pal = palette(cfg.bgStyle);
    const g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    g.addColorStop(0,pal.bg1); g.addColorStop(1,pal.bg2);
    ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalAlpha = 0.12; ctx.fillStyle = pal.accent;
    ctx.beginPath(); ctx.arc(900,260,220,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(180,1680,180,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    const panelX=90,panelY=170,panelW=900,panelH=1430;
    drawRoundedRect(ctx,panelX,panelY,panelW,panelH,42);
    ctx.fillStyle = (cfg.bgStyle==="淡色簡約" || cfg.bgStyle==="奶茶質感") ? "rgba(255,255,255,0.66)" : "rgba(15,23,42,0.42)";
    ctx.fill();

    if(cfg.showTag==="顯示"){
      drawRoundedRect(ctx,120,110,200,58,29); ctx.fillStyle = pal.accent; ctx.fill();
      ctx.fillStyle = pal.bg1; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(story.short,220,148);
    }

    ctx.fillStyle = pal.text;
    ctx.textAlign = cfg.align==="置中" ? "center" : "left";
    ctx.font = "bold 52px sans-serif";
    const headerX = cfg.align==="置中" ? 540 : 140;
    ctx.fillText(firstTopic(cfg), headerX, 260);

    ctx.fillStyle = pal.text; ctx.font = "42px sans-serif";
    const maxWidth = 760, lines = wrapText(ctx, story.text, maxWidth), lineHeight = 66;
    let y = 410; const x = cfg.align==="置中" ? 540 : 160;
    lines.slice(0,18).forEach(line => {
      if(line==="") y += 28;
      else { ctx.fillText(line, x, y); y += lineHeight; }
    });

    ctx.fillStyle = pal.sub; ctx.font = "28px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(cfg.brandName,120,1770); ctx.textAlign = "right"; ctx.fillText(`第 ${pageNum} 頁`,960,1770);

    ctx.strokeStyle = pal.accent; ctx.lineWidth = 3; ctx.globalAlpha = 0.55;
    drawRoundedRect(ctx,120,1710,840,2,1); ctx.stroke(); ctx.globalAlpha = 1;
  }
  function downloadCanvas(canvas,filename){
    const link = document.createElement("a");
    link.download = filename; link.href = canvas.toDataURL("image/png"); link.click();
  }
  function downloadAll(){
    document.querySelectorAll("#canvasWrap canvas").forEach((canvas,idx) => {
      setTimeout(()=>downloadCanvas(canvas,`ig-story-${idx+1}.png`), idx*250);
    });
  }
  function copyAll(){
    const cfg = getConfig(), stories = buildStories(cfg);
    copyText(stories.map((s,i)=>`【限動 ${i+1}｜${s.title}】\n${s.text}`).join("\n\n"));
  }

  document.getElementById("generateBtn").addEventListener("click", renderStoriesAndCards);
  document.getElementById("copyAllBtn").addEventListener("click", copyAll);
  document.getElementById("downloadAllBtn").addEventListener("click", downloadAll);

  renderEmotions();
  renderStoriesAndCards();
})();
</script>
</body>
</html>
